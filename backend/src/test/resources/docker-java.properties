# Docker Engine 29+ rejects API versions below 1.40, but the docker-java
# bundled with Testcontainers 1.x falls back to API 1.32.
# Pin a supported version until we migrate to Testcontainers 2.x, which
# negotiates the API version automatically.
# See https://github.com/testcontainers/testcontainers-java/issues/11235
api.version=1.44
